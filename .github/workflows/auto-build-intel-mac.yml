name: Auto Build Intel Mac

on:
  schedule:
    # 每周一早上 2 点运行（UTC 18:00 = 北京时间 2:00）
    - cron: '0 18 * * 1'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-12

    steps:
    - name: Checkout code from upstream
      uses: actions/checkout@v4
      with:
        repository: qiin2333/moonlight-qt
        ref: master
        fetch-depth: 1

    - name: Install dependencies
      run: |
        brew install qt@6 sdl2 sdl2_ttf ffmpeg opus
        echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH
        echo "$(brew --prefix qt@6)/mkspecs" >> $GITHUB_PATH
        echo "$(brew --prefix qt@6)/plugins" >> $GITHUB_PATH

    - name: Configure and Build
      run: |
        mkdir -p build
        cd build
        qmake ../app/app.pro PREFIX=""
        make -j$(sysctl -n hw.ncpu)

    - name: Manual moc workaround
      run: |
        # 手动生成 moc 文件（如果 qmake 没自动生成）
        moc ../app/backend/computermanager.cpp -o ../app/computermanager.moc
        moc ../app/backend/boxartmanager.cpp -o ../app/boxartmanager.moc
        moc ../app/gui/computermodel.cpp -o ../app/computermodel.moc
        # 重新编译（如果需要）
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Package .app
      run: |
        cd build
        # 复制依赖库到 app bundle
        macdeployqt app/Moonlight.app -dmg
        # 如果没有 dmg，就 zip
        if [ ! -f Moonlight.dmg ]; then
          ditto -c -k --sequesterRsrc --keepParent app/Moonlight.app Moonlight-IntelMac.zip
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: auto-build-${{ github.run_number }}
        name: Auto Build #${{ github.run_number }} (Intel Mac)
        files: |
          build/Moonlight-IntelMac.zip
          build/Moonlight.dmg
        body: |
          🤖 自动编译的 Intel Mac 版本
          基于 qiin2333/moonlight-qt 最新代码
          Build Number: ${{ github.run_number }}
          适用：Intel Mac (x86_64)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
